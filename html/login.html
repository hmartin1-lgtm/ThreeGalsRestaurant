<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login | Three Gals</title>
  <link rel="stylesheet" href="/css/styles.css">
  <style>
    .login-container {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 20px;
      background: linear-gradient(135deg, var(--green-50), var(--white));
    }
    
    .login-card {
      width: 100%;
      max-width: 400px;
      background: var(--white);
      border: 1px solid var(--line);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: 48px 32px;
    }
    
    .login-header {
      text-align: center;
      margin-bottom: 40px;
    }
    
    .login-header .brand {
      justify-content: center;
      margin-bottom: 20px;
    }
    
    .login-header h1 {
      margin: 0 0 8px;
      font-size: 1.8rem;
      color: var(--ink);
    }
    
    .login-header p {
      margin: 0;
      color: var(--muted);
      font-size: 0.95rem;
    }
    
    .form-group {
      margin-bottom: 20px;
    }
    
    .form-group label {
      display: block;
      margin-bottom: 8px;
      font-weight: 700;
      color: var(--ink);
      font-size: 0.95rem;
    }
    
    .form-group input {
      width: 100%;
      padding: 12px 14px;
      border: 1px solid var(--line);
      border-radius: 10px;
      font-size: 1rem;
      transition: border-color 0.2s ease;
    }
    
    .form-group input:focus {
      outline: none;
      border-color: var(--green-900);
      box-shadow: 0 0 0 3px rgba(17, 77, 44, 0.1);
    }
    
    .login-button {
      width: 100%;
      padding: 12px;
      background: var(--green-900);
      color: var(--white);
      border: 0;
      border-radius: 10px;
      font-weight: 800;
      font-size: 1rem;
      cursor: pointer;
      transition: transform 0.2s ease, opacity 0.2s ease;
    }
    
    .login-button:hover {
      transform: translateY(-2px);
    }
    
    .login-button:active {
      transform: translateY(0);
    }
    
    .error-message {
      display: none;
      margin-bottom: 20px;
      padding: 12px;
      background: #fee;
      border: 1px solid #fcc;
      border-radius: 8px;
      color: #c00;
      font-size: 0.9rem;
      text-align: center;
    }
    
    .error-message.show {
      display: block;
    }
  </style>
</head>
<body>
  <div class="login-container">
    <div class="login-card">
      <div class="login-header">
        <a class="brand" href="index.html">
          <span class="brand-mark">3G</span>
          <span>Three Gals</span>
        </a>
        <h1>Manager Login</h1>
        <p>Access your orders management dashboard</p>
      </div>
      
      <form id="loginForm">
        <div class="error-message" id="errorMessage"></div>
        
        <div class="form-group">
          <label for="username">Username</label>
          <input 
            type="text" 
            id="username" 
            name="username" 
            placeholder="Enter username"
            autocomplete="username"
            required
          >
        </div>
        
        <div class="form-group">
          <label for="password">Password</label>
          <input 
            type="password" 
            id="password" 
            name="password" 
            placeholder="Enter password"
            autocomplete="current-password"
            required
          >
        </div>
        
        <button type="submit" class="login-button">Login</button>
      </form>
    </div>
  </div>
  
  <script>
    const loginForm = document.getElementById('loginForm');
    const errorMessage = document.getElementById('errorMessage');
    const usernameInput = document.getElementById('username');
    const passwordInput = document.getElementById('password');
    
    // Credentials
    const VALID_USERNAME = 'three gals';
    const VALID_PASSWORD = '1234';
    
    loginForm.addEventListener('submit', function(e) {
      e.preventDefault();
      
      const username = usernameInput.value.trim();
      const password = passwordInput.value;
      
      if (username === VALID_USERNAME && password === VALID_PASSWORD) {
        // Store login state
        localStorage.setItem('isLoggedIn', 'true');
        localStorage.setItem('loginTime', new Date().toISOString());
        
        // Redirect to orders page
        window.location.href = 'orders.html';
      } else {
        errorMessage.textContent = 'Invalid username or password';
        errorMessage.classList.add('show');
        passwordInput.value = '';
        passwordInput.focus();
      }
    });
  </script>
</body>
</html>
