<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Customize Burger</title>
  <link rel="stylesheet" href="/css/styles.css">
</head>
<body>

<div class="container">
  <h1 id="burger-title">Customize Your Burger</h1>

  <form id="customize-form" class="card">

    <h3>Toppings</h3>

    <label><input type="checkbox" value="Lettuce"> Lettuce</label>
    <label><input type="checkbox" value="Tomato"> Tomato</label>
    <label><input type="checkbox" value="Onions"> Onions</label>
    <label><input type="checkbox" value="Pickles"> Pickles</label>
    <label><input type="checkbox" value="Bacon" data-price="1"> Bacon (+$1)</label>

    <br><br>

    <button class="btn btn-primary">Add to Bag</button>

  </form>
</div>

<script src="/Java/app.js"></script>
</body>
</html>
